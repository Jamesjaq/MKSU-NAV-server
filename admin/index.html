<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MKSU Admin</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:#111;color:#fff;height:100dvh;overflow:hidden}
#map{width:100%;height:100dvh}
.bar{position:fixed;top:0;left:0;right:0;z-index:999;background:rgba(0,0,0,0.85);padding:8px 12px;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.bar h1{font-size:15px;margin-right:auto;color:#4fc3f7}
.bar button{background:rgba(255,255,255,0.1);border:none;color:#fff;padding:5px 12px;border-radius:6px;font-size:12px;cursor:pointer}
.bar button:hover{background:rgba(255,255,255,0.2)}
.bar button.green{background:#2e7d32}
.bar button.red{background:#c62828}
.bar button.blue{background:#1565c0}
.bar .count{color:#888;font-size:11px;margin-right:8px}
.panel{position:fixed;bottom:0;left:0;right:0;z-index:999;background:rgba(0,0,0,0.92);border-radius:16px 16px 0 0;padding:16px;max-height:50vh;overflow-y:auto;display:none;border-top:1px solid rgba(255,255,255,0.1)}
.panel h2{font-size:15px;margin-bottom:10px;color:#4fc3f7}
.panel label{color:#999;font-size:11px;display:block;margin-bottom:2px;margin-top:8px}
.panel input,.panel select{width:100%;padding:8px 10px;border:1px solid rgba(255,255,255,0.2);border-radius:6px;background:rgba(255,255,255,0.05);color:#fff;font-size:14px}
.panel .row{display:flex;gap:8px;margin-top:8px}
.panel .row button{flex:1;padding:10px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer}
.panel .btn-primary{background:#4fc3f7;color:#000}
.panel .btn-danger{background:#c62828;color:#fff}
.panel .btn-ghost{background:rgba(255,255,255,0.1);color:#ccc}
.panel .btn-ghost:hover{background:rgba(255,255,255,0.2)}
.toast{position:fixed;top:52px;left:50%;transform:translateX(-50%);z-index:9999;background:rgba(0,0,0,0.9);color:#fff;padding:6px 16px;border-radius:8px;font-size:13px;pointer-events:none;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
</style>
</head>
<body>
<div id="map"></div>
<div class="toast" id="toast"></div>

<div class="bar">
  <h1>MKSU Admin</h1>
  <span class="count" id="wpCount">0</span>
  <span class="count" id="edgeCount">0</span>
  <button class="blue" id="btnLocate">📍</button>
  <button id="btnAddWp">+ Waypoint</button>
  <button id="btnConnect">🔗 Connect</button>
  <button id="btnVerify">🔍 Verify</button>
  <button id="btnList">☰ List</button>
  <button class="red" id="btnPub">☁️ Pub</button>
</div>

<div class="panel" id="panelEdit">
  <h2 id="editTitle">Edit</h2>
  <label>Name</label>
  <input id="editName" placeholder="Name for this location">
  <label>Type</label>
  <select id="editType">
    <option value="junction">Junction</option>
    <option value="classroom">Classroom</option>
    <option value="office">Office</option>
    <option value="lab">Lab</option>
    <option value="entrance">Entrance</option>
    <option value="cafeteria">Cafeteria</option>
    <option value="library">Library</option>
    <option value="hostel">Hostel</option>
    <option value="gate">Gate</option>
    <option value="service">Service</option>
  </select>
  <label>Floor</label>
  <select id="editFloor">
    <option value="0">Ground</option>
    <option value="1">Floor 1</option>
    <option value="2">Floor 2</option>
    <option value="3">Floor 3</option>
  </select>
  <div class="row">
    <button class="btn-primary" id="btnSave">Save</button>
    <button class="btn-danger" id="btnDel">Delete</button>
    <button class="btn-ghost" id="btnClose">Close</button>
  </div>
</div>

<div class="panel" id="panelList">
  <h2>Waypoints</h2>
  <div id="wpList"></div>
  <div class="row"><button class="btn-ghost" id="btnCloseList">Close</button></div>
</div>

<script>
const REPO = 'Jamesjaq/MKSU-NAV-server';
const DATA_PATH = 'data.json';
let TOKEN = localStorage.getItem('gh_token') || '';
let data = null;
let map, buildingsEdgesLayer, markersLayer, verifyLayer;
let adding = false, connecting = false, verifying = false;
let connFrom = null, verFrom = null;
let selectedId = null;

// -- Init map --
map = L.map('map').setView([-1.5317, 37.2625], 16);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19, attribution: 'OSM'
}).addTo(map);

buildingsEdgesLayer = L.layerGroup().addTo(map);
markersLayer = L.layerGroup().addTo(map);
verifyLayer = L.layerGroup().addTo(map);

function toast(msg, dur) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(function(){ t.classList.remove('show'); }, dur || 2500);
}

// -- Load data --
async function load() {
  try {
    var r = await fetch('https://raw.githubusercontent.com/' + REPO + '/main/' + DATA_PATH + '?_=' + Date.now());
    data = await r.json();
  } catch(e) {
    data = null;
  }
  if (!data) {
    data = {
      version: 1, updatedAt: new Date().toISOString(),
      campus: { name: 'Machakos University', shortName: 'MKSU', centerLat: -1.5167, centerLng: 37.2673 },
      buildings: [], pois: [], qrMarkers: [],
      pathGraph: { waypoints: [], edges: [] }
    };
  }
  render();
}

// -- Haversine --
function haversine(lat1, lng1, lat2, lng2) {
  var R = 6371000;
  var dLat = (lat2 - lat1) * Math.PI / 180;
  var dLng = (lng2 - lng1) * Math.PI / 180;
  var a = Math.sin(dLat/2) * Math.sin(dLat/2) +
          Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
          Math.sin(dLng/2) * Math.sin(dLng/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function bearing(lat1, lng1, lat2, lng2) {
  var dLng = (lng2 - lng1) * Math.PI / 180;
  var y = Math.sin(dLng) * Math.cos(lat2 * Math.PI / 180);
  var x = Math.cos(lat1 * Math.PI / 180) * Math.sin(lat2 * Math.PI / 180) -
          Math.sin(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.cos(dLng);
  return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
}

// -- A* --
function astar(fid, tid) {
  var adj = {};
  var nodes = {};
  data.pathGraph.waypoints.forEach(function(w){ nodes[w.id] = w; });
  data.pathGraph.edges.forEach(function(e){
    if (!adj[e.from]) adj[e.from] = [];
    if (!adj[e.to]) adj[e.to] = [];
    adj[e.from].push({t:e.to, w:e.weight});
    adj[e.to].push({t:e.from, w:e.weight});
  });
  if (!nodes[fid] || !nodes[tid]) return null;
  var open = [fid], visited = {};
  var gs = {}; gs[fid] = 0;
  var fs = {}; fs[fid] = haversine(nodes[fid].lat, nodes[fid].lng, nodes[tid].lat, nodes[tid].lng);
  var cf = {};
  while (open.length) {
    var best = 0;
    for (var i = 1; i < open.length; i++) {
      if ((fs[open[i]] || Infinity) < (fs[open[best]] || Infinity)) best = i;
    }
    var cur = open.splice(best, 1)[0];
    if (visited[cur]) continue;
    visited[cur] = true;
    if (cur === tid) {
      var path = [cur];
      while (cf[cur] !== undefined) { cur = cf[cur]; path.unshift(cur); }
      var dist = 0;
      for (var j = 0; j < path.length - 1; j++) {
        dist += haversine(nodes[path[j]].lat, nodes[path[j]].lng, nodes[path[j+1]].lat, nodes[path[j+1]].lng);
      }
      return { path: path, distance: dist };
    }
    if (!adj[cur]) continue;
    for (var k = 0; k < adj[cur].length; k++) {
      var edge = adj[cur][k];
      var tent = (gs[cur] || Infinity) + edge.w;
      if (tent < (gs[edge.t] || Infinity)) {
        cf[edge.t] = cur;
        gs[edge.t] = tent;
        fs[edge.t] = tent + haversine(nodes[edge.t].lat, nodes[edge.t].lng, nodes[tid].lat, nodes[tid].lng);
        open.push(edge.t);
      }
    }
  }
  return null;
}

// -- Render --
var nextId = 100;

function render() {
  buildingsEdgesLayer.clearLayers();
  markersLayer.clearLayers();
  verifyLayer.clearLayers();
  if (!data) return;

  nextId = 100;
  data.pathGraph.waypoints.forEach(function(w){ if (w.id >= nextId) nextId = w.id + 1; });

  // Buildings
  data.buildings.forEach(function(b){
    if (!b.outline || b.outline.length < 3) return;
    var pts = b.outline.map(function(p){ return [p.lat, p.lng]; });
    L.polygon(pts, {
      color: '#4fc3f7', weight: 2, fillColor: 'rgba(79,195,247,0.15)', fillOpacity: 0.4
    }).addTo(buildingsEdgesLayer);
    L.marker([b.lat, b.lng], {
      icon: L.divIcon({
        className: '',
        html: '<div style="background:rgba(0,0,0,0.6);color:#4fc3f7;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;border:1px solid rgba(79,195,247,0.3)">' + (b.abbreviation || b.name) + '</div>',
        iconSize: [0,0], iconAnchor: [0,0]
      })
    }).addTo(buildingsEdgesLayer);
  });

  // Edges
  data.pathGraph.edges.forEach(function(e){
    var a = getWp(e.from), b = getWp(e.to);
    if (!a || !b) return;
    L.polyline([[a.lat,a.lng],[b.lat,b.lng]], {
      color: '#66bb6a', weight: 2, opacity: 0.6
    }).bindTooltip(e.weight + 'm').addTo(buildingsEdgesLayer);
  });

  // Waypoints
  data.pathGraph.waypoints.forEach(function(w){
    var poi = findPoiNear(w.lat, w.lng);
    var color = poi ? '#ffa726' : '#4fc3f7';
    var r = poi ? 8 : 6;
    var m = L.circleMarker([w.lat, w.lng], {
      radius: r, color: '#fff', weight: 2, fillColor: color, fillOpacity: 0.9
    });
    var name = poi ? poi.name : '#' + w.id;
    m.bindTooltip(name + ' (f' + w.floor + ')');
    m._id = w.id;
    m.on('click', function(){ selectWp(this._id); });
    markersLayer.addLayer(m);
  });

  updateCounts();
}

function getWp(id) {
  for (var i = 0; i < data.pathGraph.waypoints.length; i++) {
    if (data.pathGraph.waypoints[i].id === id) return data.pathGraph.waypoints[i];
  }
  return null;
}

function findPoiNear(lat, lng) {
  for (var i = 0; i < data.pois.length; i++) {
    var p = data.pois[i];
    if (Math.abs(p.lat - lat) < 0.00005 && Math.abs(p.lng - lng) < 0.00005) return p;
  }
  return null;
}

function updateCounts() {
  document.getElementById('wpCount').textContent = data.pathGraph.waypoints.length + ' wp';
  document.getElementById('edgeCount').textContent = data.pathGraph.edges.length + ' ed';
}

function selectWp(id) {
  selectedId = id;
  var w = getWp(id);
  if (!w) return;

  // Highlight
  markersLayer.eachLayer(function(m){
    if (m._id === id) {
      m.setStyle({ radius: 12, color: '#ef5350', weight: 3 });
    } else {
      m.setStyle({ radius: (findPoiNear(m.getLatLng().lat, m.getLatLng().lng) ? 8 : 6), color: '#fff', weight: 2 });
    }
  });

  // Open edit panel
  var poi = findPoiNear(w.lat, w.lng);
  document.getElementById('editTitle').textContent = 'Edit #' + id;
  document.getElementById('editName').value = poi ? poi.name : '';
  document.getElementById('editType').value = poi ? poi.type : 'junction';
  document.getElementById('editFloor').value = '' + w.floor;
  showPanel('panelEdit');
}

// -- Map click --
map.on('click', function(e){
  if (adding) {
    var lat = e.latlng.lat, lng = e.latlng.lng;
    // Duplicate check
    var dup = false;
    for (var i = 0; i < data.pathGraph.waypoints.length; i++) {
      var w = data.pathGraph.waypoints[i];
      if (haversine(w.lat, w.lng, lat, lng) < 15 && w.floor === 0) { dup = w.id; break; }
    }
    if (dup) { toast('Too close to #' + dup + ' (< 15m)'); return; }
    var id = nextId++;
    data.pathGraph.waypoints.push({ id: id, lat: lat, lng: lng, floor: 0 });
    toast('Waypoint #' + id + ' placed');
    adding = false;
    document.getElementById('btnAddWp').style.background = '';
    render();
    selectWp(id);
    return;
  }

  if (connecting) {
    var closest = null, minD = Infinity;
    markersLayer.eachLayer(function(m){
      if (!m._id) return;
      var d = haversine(e.latlng.lat, e.latlng.lng, m.getLatLng().lat, m.getLatLng().lng);
      if (d < minD) { minD = d; closest = m._id; }
    });
    if (minD > 30) return;
    if (connFrom === null) {
      connFrom = closest;
      toast('First: #' + connFrom + '. Now tap second.');
      markersLayer.eachLayer(function(m){
        m.setStyle({ radius: m._id === connFrom ? 12 : 6, color: m._id === connFrom ? '#ffa726' : '#fff', weight: m._id === connFrom ? 3 : 2 });
      });
    } else {
      if (closest === connFrom) { toast('Same waypoint'); return; }
      // Check if edge exists
      var exists = false;
      for (var i = 0; i < data.pathGraph.edges.length; i++) {
        var ed = data.pathGraph.edges[i];
        if ((ed.from === connFrom && ed.to === closest) || (ed.from === closest && ed.to === connFrom)) { exists = true; break; }
      }
      if (exists) { toast('Edge already exists'); connecting = false; connFrom = null; document.getElementById('btnConnect').style.background = ''; render(); return; }
      var a = getWp(connFrom), b = getWp(closest);
      var weight = Math.round(haversine(a.lat, a.lng, b.lat, b.lng));
      data.pathGraph.edges.push({ from: connFrom, to: closest, weight: weight });
      toast('Connected #' + connFrom + ' ↔ #' + closest + ' (' + weight + 'm)');
      connecting = false; connFrom = null;
      document.getElementById('btnConnect').style.background = '';
      render();
    }
    return;
  }

  if (verifying) {
    var closest = null, minD = Infinity;
    markersLayer.eachLayer(function(m){
      if (!m._id) return;
      var d = haversine(e.latlng.lat, e.latlng.lng, m.getLatLng().lat, m.getLatLng().lng);
      if (d < minD) { minD = d; closest = m._id; }
    });
    if (minD > 30) return;
    if (verFrom === null) {
      verFrom = closest;
      toast('Start: #' + verFrom + '. Tap destination.');
    } else {
      if (closest === verFrom) { toast('Same point'); return; }
      verifyLayer.clearLayers();
      var result = astar(verFrom, closest);
      if (!result) { toast('No path found!'); return; }
      var latlngs = [];
      var nodes = {};
      data.pathGraph.waypoints.forEach(function(w){ nodes[w.id] = w; });
      for (var i = 0; i < result.path.length; i++) {
        latlngs.push([nodes[result.path[i]].lat, nodes[result.path[i]].lng]);
      }
      L.polyline(latlngs, { color: '#ef5350', weight: 5, opacity: 0.8 }).addTo(verifyLayer);
      var start = nodes[result.path[0]];
      var end = nodes[result.path[result.path.length - 1]];
      L.circleMarker([start.lat, start.lng], { radius: 10, color: '#fff', weight: 3, fillColor: '#66bb6a', fillOpacity: 1 }).bindTooltip('Start').addTo(verifyLayer);
      L.circleMarker([end.lat, end.lng], { radius: 10, color: '#fff', weight: 3, fillColor: '#ef5350', fillOpacity: 1 }).bindTooltip('Destination').addTo(verifyLayer);
      map.fitBounds(latlngs, { padding: [60, 60] });
      toast('Path: ' + result.distance.toFixed(0) + 'm (' + result.path.length + ' stops)');
      verifying = false; verFrom = null;
      document.getElementById('btnVerify').style.background = '';
    }
    return;
  }
});

// -- Panel helpers --
function showPanel(id) {
  var panels = document.querySelectorAll('.panel');
  for (var i = 0; i < panels.length; i++) panels[i].style.display = 'none';
  document.getElementById(id).style.display = 'block';
}

function hidePanels() {
  var panels = document.querySelectorAll('.panel');
  for (var i = 0; i < panels.length; i++) panels[i].style.display = 'none';
}

// -- Button handlers --
document.getElementById('btnAddWp').onclick = function(){
  adding = !adding;
  this.style.background = adding ? '#2e7d32' : '';
  connecting = false; verifying = false; connFrom = null; verFrom = null;
  document.getElementById('btnConnect').style.background = '';
  document.getElementById('btnVerify').style.background = '';
  if (adding) toast('Tap on the map to place a waypoint');
};

document.getElementById('btnConnect').onclick = function(){
  connecting = !connecting;
  this.style.background = connecting ? '#2e7d32' : '';
  adding = false; verifying = false; connFrom = null; verFrom = null;
  document.getElementById('btnAddWp').style.background = '';
  document.getElementById('btnVerify').style.background = '';
  if (connecting) toast('Tap the FIRST waypoint on the map');
};

document.getElementById('btnVerify').onclick = function(){
  verifying = !verifying;
  this.style.background = verifying ? '#2e7d32' : '';
  adding = false; connecting = false; connFrom = null; verFrom = null;
  document.getElementById('btnAddWp').style.background = '';
  document.getElementById('btnConnect').style.background = '';
  if (verifying) {
    verifyLayer.clearLayers();
    toast('Tap the START waypoint on the map');
  }
};

document.getElementById('btnSave').onclick = function(){
  if (selectedId === null) return;
  var w = getWp(selectedId);
  if (!w) return;
  var name = document.getElementById('editName').value.trim();
  var type = document.getElementById('editType').value;
  var floor = parseInt(document.getElementById('editFloor').value);
  var poi = findPoiNear(w.lat, w.lng);
  if (poi) {
    poi.name = name || poi.name;
    poi.type = type;
    poi.floor = floor;
  } else if (name && type !== 'junction') {
    data.pois.push({ id: 'poi-' + selectedId, name: name, type: type, buildingId: null, floor: floor, lat: w.lat, lng: w.lng, altitude: 0, description: '' });
  }
  w.floor = floor;
  toast('Saved');
  render();
  hidePanels();
};

document.getElementById('btnDel').onclick = function(){
  if (selectedId === null) return;
  if (!confirm('Delete #' + selectedId + '?')) return;
  data.pathGraph.edges = data.pathGraph.edges.filter(function(e){ return e.from !== selectedId && e.to !== selectedId; });
  data.pathGraph.waypoints = data.pathGraph.waypoints.filter(function(w){ return w.id !== selectedId; });
  data.pois = data.pois.filter(function(p){
    for (var i = 0; i < data.pathGraph.waypoints.length; i++) {
      if (Math.abs(data.pathGraph.waypoints[i].lat - p.lat) < 0.00005 && Math.abs(data.pathGraph.waypoints[i].lng - p.lng) < 0.00005) return true;
    }
    return false;
  });
  selectedId = null;
  toast('Deleted');
  render();
  hidePanels();
};

document.getElementById('btnClose').onclick = hidePanels;
document.getElementById('btnCloseList').onclick = hidePanels;

document.getElementById('btnList').onclick = function(){
  var el = document.getElementById('wpList');
  var html = '';
  data.pathGraph.waypoints.forEach(function(w){
    var poi = findPoiNear(w.lat, w.lng);
    var ec = 0;
    data.pathGraph.edges.forEach(function(e){ if (e.from === w.id || e.to === w.id) ec++; });
    var name = poi ? poi.name : '#' + w.id;
    html += '<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.05);cursor:pointer" onclick="selectWp(' + w.id + ');hidePanels()">';
    html += '<span style="width:8px;height:8px;border-radius:50%;background:' + (poi ? '#ffa726' : '#4fc3f7') + '"></span>';
    html += '<span style="flex:1;font-size:13px;color:#ddd">' + name + '</span>';
    html += '<span style="color:#666;font-size:11px">f' + w.floor + ' · ' + ec + ' edges</span>';
    html += '</div>';
  });
  el.innerHTML = html || '<div style="color:#666;padding:10px">No waypoints yet</div>';
  showPanel('panelList');
};

document.getElementById('btnLocate').onclick = function(){
  if (!navigator.geolocation) { toast('No GPS'); return; }
  navigator.geolocation.getCurrentPosition(function(pos){
    map.setView([pos.coords.latitude, pos.coords.longitude], 18);
    L.circleMarker([pos.coords.latitude, pos.coords.longitude], {
      radius: 8, color: '#4fc3f7', fillColor: '#4fc3f7', fillOpacity: 0.3, weight: 3
    }).addTo(verifyLayer).bindTooltip('You').openTooltip();
    toast('📍 ' + pos.coords.latitude.toFixed(5) + ', ' + pos.coords.longitude.toFixed(5));
  });
};

document.getElementById('btnPub').onclick = async function(){
  if (!TOKEN) {
    TOKEN = prompt('GitHub token:');
    if (!TOKEN) return;
    localStorage.setItem('gh_token', TOKEN);
  }
  data.version = (data.version || 0) + 1;
  data.updatedAt = new Date().toISOString();
  var content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
  var sha = '';
  try {
    var r = await fetch('https://api.github.com/repos/' + REPO + '/contents/' + DATA_PATH, {
      headers: { 'Authorization': 'token ' + TOKEN }
    });
    if (r.ok) sha = (await r.json()).sha;
  } catch(e) {}
  try {
    var r = await fetch('https://api.github.com/repos/' + REPO + '/contents/' + DATA_PATH, {
      method: 'PUT',
      headers: { 'Authorization': 'token ' + TOKEN, 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: 'Admin update v' + data.version, content: content, sha: sha || undefined, branch: 'main' })
    });
    if (r.ok) {
      toast('Published v' + data.version + '!', 4000);
    } else {
      var err = await r.json();
      toast('Error: ' + err.message, 4000);
    }
  } catch(e) {
    toast('Network error', 3000);
  }
};

// -- Start --
load();
</script>
</body>
</html>
