<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>MKSU-NAV Admin</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden;height:100dvh}
#map{width:100%;height:100dvh}
.toolbar{position:fixed;top:10px;left:50%;transform:translateX(-50%);z-index:1000;background:#fff;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,0.2);display:flex;gap:4px;padding:4px;flex-wrap:wrap;justify-content:center}
.toolbar button{padding:8px 16px;border:2px solid transparent;border-radius:8px;background:#f0f0f0;cursor:pointer;font-weight:600;font-size:13px;transition:all .15s;white-space:nowrap}
.toolbar button:hover{background:#e0e0e0}
.toolbar button.active{border-color:#1565C0;background:#e3f2fd;color:#1565C0}
.toolbar button.danger{color:#d32f2f}
.toolbar button.danger.active{border-color:#d32f2f;background:#ffebee;color:#d32f2f}
.toolbar .sep{width:1px;background:#ddd;margin:4px}
.panel{position:fixed;bottom:0;left:0;right:0;z-index:1000;background:#fff;border-radius:16px 16px 0 0;box-shadow:0 -2px 12px rgba(0,0,0,0.15);padding:12px 16px;max-height:45dvh;overflow-y:auto;transition:transform .3s}
.panel.collapsed{transform:translateY(calc(100% - 50px))}
.panel-handle{text-align:center;margin-bottom:8px;cursor:pointer;user-select:none;color:#999;font-size:20px;line-height:12px}
.panel-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:8px}
.panel label{font-size:12px;font-weight:600;color:#666;text-transform:uppercase;letter-spacing:0.5px}
.panel input,.panel select{padding:6px 10px;border:1px solid #ccc;border-radius:6px;font-size:14px;flex:1;min-width:100px}
.panel button{padding:8px 20px;border:none;border-radius:8px;cursor:pointer;font-weight:600;font-size:14px;transition:all .15s}
.btn-primary{background:#1565C0;color:#fff}
.btn-primary:hover{background:#0D47A1}
.btn-success{background:#2e7d32;color:#fff}
.btn-success:hover{background:#1b5e20}
.btn-danger{background:#d32f2f;color:#fff}
.btn-danger:hover{background:#b71c1c}
.btn-secondary{background:#757575;color:#fff}
.btn-warning{background:#e65100;color:#fff}
.waypoint-list{display:flex;flex-direction:column;gap:2px;max-height:200px;overflow-y:auto;margin-top:8px}
.waypoint-item{display:flex;align-items:center;gap:8px;padding:4px 8px;border-radius:4px;font-size:13px;cursor:pointer;transition:background .15s}
.waypoint-item:hover{background:#f5f5f5}
.waypoint-item .color-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.waypoint-item .name{flex:1}
.waypoint-item .del-btn{color:#d32f2f;cursor:pointer;font-weight:bold;padding:2px 6px;border-radius:4px}
.waypoint-item .del-btn:hover{background:#ffebee}
.floor-selector{display:flex;gap:4px}
.floor-selector button{padding:4px 12px;border:1px solid #ccc;border-radius:4px;background:#fff;cursor:pointer;font-size:13px}
.floor-selector button.active{background:#1565C0;color:#fff;border-color:#1565C0}
.status-bar{position:fixed;top:60px;left:50%;transform:translateX(-50%);z-index:1000;background:rgba(0,0,0,0.8);color:#fff;padding:6px 16px;border-radius:20px;font-size:13px;pointer-events:none;transition:opacity .3s;opacity:0}
.status-bar.show{opacity:1}
@media(min-width:768px){
  .panel{left:auto;right:10px;bottom:10px;width:380px;max-height:80dvh;border-radius:12px}
  .toolbar{top:10px;left:10px;transform:none}
  .status-bar{top:10px;left:auto;right:420px;transform:none}
}
</style>
</head>
<body>
<div id="map"></div>

<div class="toolbar" id="toolbar">
  <button data-mode="view" class="active">View</button>
  <button data-mode="place">Place</button>
  <button data-mode="connect">Connect</button>
  <button data-mode="verify">Verify</button>
  <div class="sep"></div>
  <button data-mode="publish" class="danger">Publish</button>
</div>

<div class="status-bar" id="status"></div>

<div class="panel" id="panel">
  <div class="panel-handle" id="panelHandle">―</div>

  <div id="panelPlace" style="display:none">
    <div class="panel-row">
      <label>Name</label>
      <input id="wpName" placeholder="e.g. Library Entrance" />
    </div>
    <div class="panel-row">
      <label>Type</label>
      <select id="wpType">
        <option value="junction">Junction</option>
        <option value="entrance">Entrance</option>
        <option value="classroom">Classroom</option>
        <option value="office">Office</option>
        <option value="lab">Lab</option>
        <option value="cafeteria">Cafeteria</option>
        <option value="library">Library</option>
        <option value="service">Service</option>
        <option value="hostel">Hostel</option>
        <option value="gate">Gate</option>
      </select>
    </div>
    <div class="panel-row">
      <label>Floor</label>
      <div class="floor-selector" id="placeFloor">
        <button data-floor="0" class="active">G</button>
        <button data-floor="1">1</button>
        <button data-floor="2">2</button>
        <button data-floor="3">3</button>
      </div>
    </div>
    <div class="panel-row">
      <label>Lat</label><input id="wpLat" readonly />
      <label>Lng</label><input id="wpLng" readonly />
    </div>
    <div class="panel-row">
      <button class="btn-success" id="btnSaveWp">Save Waypoint</button>
    </div>
    <div style="font-size:12px;color:#666;margin-top:4px">Tap on the map to place. Duplicate check: 15m radius.</div>
  </div>

  <div id="panelConnect" style="display:none">
    <div style="font-size:14px;margin-bottom:8px">
      <span id="connStatus">Tap the first waypoint</span>
    </div>
    <div class="panel-row">
      <button class="btn-secondary" id="btnCancelConn">Cancel</button>
    </div>
  </div>

  <div id="panelVerify" style="display:none">
    <div style="font-size:14px;margin-bottom:8px">
      <span id="verifyStatus">Tap START waypoint</span>
    </div>
    <div id="verifyResult" style="display:none;margin-top:8px;padding:8px;background:#e8f5e9;border-radius:6px;font-size:14px">
      <strong>Path found!</strong><br/>
      Distance: <span id="verifyDist"></span>m<br/>
      Steps: <span id="verifySteps"></span>
    </div>
    <div class="panel-row">
      <button class="btn-secondary" id="btnCancelVerify">Cancel</button>
    </div>
  </div>

  <div id="panelView" style="display:block">
    <div class="panel-row">
      <label>Floor</label>
      <div class="floor-selector" id="viewFloor">
        <button data-floor="0" class="active">G</button>
        <button data-floor="1">1</button>
        <button data-floor="2">2</button>
        <button data-floor="3">3</button>
        <button data-floor="-1">All</button>
      </div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;font-size:13px;color:#666;margin-bottom:4px">
      <span><span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:#1565C0;vertical-align:middle"></span> Waypoint</span>
      <span><span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:#e65100;vertical-align:middle"></span> POI</span>
      <span style="color:#4caf50">━━━ Path</span>
      <span style="color:#d32f2f">━ Verified</span>
    </div>
    <div class="waypoint-list" id="wpList"></div>
    <div class="panel-row" style="margin-top:8px">
      <button class="btn-primary" id="btnLocateMe">📍 Locate Me</button>
      <button class="btn-secondary" id="btnDownloadJson">Download JSON</button>
    </div>
  </div>

  <div id="panelEdit" style="display:none">
    <div class="panel-row"><label>ID</label><input id="editId" readonly/></div>
    <div class="panel-row"><label>Name</label><input id="editName"/></div>
    <div class="panel-row"><label>Type</label><select id="editType">
      <option value="junction">Junction</option>
      <option value="entrance">Entrance</option>
      <option value="classroom">Classroom</option>
      <option value="office">Office</option>
      <option value="lab">Lab</option>
      <option value="cafeteria">Cafeteria</option>
      <option value="library">Library</option>
      <option value="service">Service</option>
      <option value="hostel">Hostel</option>
      <option value="gate">Gate</option>
    </select></div>
    <div class="panel-row"><label>Floor</label>
      <div class="floor-selector" id="editFloor">
        <button data-floor="0">G</button><button data-floor="1">1</button>
        <button data-floor="2">2</button><button data-floor="3">3</button>
      </div>
    </div>
    <div class="panel-row"><label>Lat</label><input id="editLat"/><label>Lng</label><input id="editLng"/></div>
    <div class="panel-row" style="display:flex;gap:8px">
      <button class="btn-primary" id="btnSaveEdit">Save</button>
      <button class="btn-danger" id="btnDeleteWp">Delete</button>
      <button class="btn-secondary" id="btnCancelEdit">Cancel</button>
    </div>
  </div>
</div>

<script>
const DATA_PATH = 'data.json';
const REPO = 'Jamesjaq/MKSU-NAV-server';
let GITHUB_TOKEN = localStorage.getItem('github_token') || '';

// ---- State ----
let data = null;
let map, markersLayer, edgesLayer, verifyLayer, tempMarker;
let mode = 'view';
let selectedFloor = 0;
let placeFloor = 0;
let isPanelCollapsed = false;
let connectFirst = null;
let verifyFirst = null;
let editingWp = null;
let wpIdCounter = 100;
let gpsMarker = null;

// ---- Init Map ----
map = L.map('map', { zoomControl: true }).setView([-1.5167, 37.2673], 16);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap',
  maxZoom: 19
}).addTo(map);

markersLayer = L.layerGroup().addTo(map);
edgesLayer = L.layerGroup().addTo(map);
verifyLayer = L.layerGroup().addTo(map);

// ---- Helpers ----
function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function bearing(lat1, lng1, lat2, lng2) {
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const y = Math.sin(dLng) * Math.cos(lat2 * Math.PI / 180);
  const x = Math.cos(lat1 * Math.PI / 180) * Math.sin(lat2 * Math.PI / 180) -
            Math.sin(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.cos(dLng);
  return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
}

function bearingDiff(b1, b2) {
  const d = Math.abs(b1 - b2);
  return Math.min(d, 360 - d);
}

function showStatus(msg, duration = 3000) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._timer);
  el._timer = setTimeout(() => el.classList.remove('show'), duration);
}

// ---- Load Data ----
async function loadData() {
  try {
    const r = await fetch(`https://raw.githubusercontent.com/${REPO}/main/${DATA_PATH}?_=${Date.now()}`);
    data = await r.json();
    wpIdCounter = Math.max(...data.pathGraph.waypoints.map(w => w.id), 99) + 1;
    render();
    showStatus('Data loaded from GitHub');
  } catch(e) {
    showStatus('Could not load data. Loading defaults.', 5000);
    data = {
      version: 1, updatedAt: new Date().toISOString(),
      campus: { name: 'Machakos University', shortName: 'MKSU', centerLat: -1.5167, centerLng: 37.2673 },
      buildings: [], pois: [], qrMarkers: [], pathGraph: { waypoints: [], edges: [] }
    };
    render();
  }
}

// ---- A* ----
function astar(fromId, toId) {
  const adj = {};
  const nodes = {};
  data.pathGraph.waypoints.forEach(w => nodes[w.id] = w);
  data.pathGraph.edges.forEach(e => {
    if (!adj[e.from]) adj[e.from] = [];
    if (!adj[e.to]) adj[e.to] = [];
    adj[e.from].push({ to: e.to, w: e.weight });
    adj[e.to].push({ to: e.from, w: e.weight });
  });
  if (!nodes[fromId] || !nodes[toId]) return null;

  const open = new Set([fromId]);
  const cameFrom = {};
  const gScore = {}; gScore[fromId] = 0;
  const fScore = {}; fScore[fromId] = haversine(nodes[fromId].lat, nodes[fromId].lng, nodes[toId].lat, nodes[toId].lng);

  while (open.size) {
    let current = null, bestF = Infinity;
    for (const id of open) {
      if ((fScore[id] ?? Infinity) < bestF) { bestF = fScore[id]; current = id; }
    }
    if (current === toId) {
      const path = [current];
      while (cameFrom[current] !== undefined) { current = cameFrom[current]; path.unshift(current); }
      let dist = 0;
      for (let i = 0; i < path.length - 1; i++) {
        dist += haversine(nodes[path[i]].lat, nodes[path[i]].lng, nodes[path[i+1]].lat, nodes[path[i+1]].lng);
      }
      return { path, distance: dist };
    }
    open.delete(current);
    (adj[current] || []).forEach(({ to, w }) => {
      const tent = (gScore[current] ?? Infinity) + w;
      if (tent < (gScore[to] ?? Infinity)) {
        cameFrom[to] = current;
        gScore[to] = tent;
        fScore[to] = tent + haversine(nodes[to].lat, nodes[to].lng, nodes[toId].lat, nodes[toId].lng);
        open.add(to);
      }
    });
  }
  return null;
}

function findTurnIndices(pathIds) {
  const nodes = {};
  data.pathGraph.waypoints.forEach(w => nodes[w.id] = w);
  if (pathIds.length < 3) return pathIds;
  const turns = [pathIds[0]];
  for (let i = 1; i < pathIds.length - 1; i++) {
    const a = nodes[pathIds[i-1]], b = nodes[pathIds[i]], c = nodes[pathIds[i+1]];
    if (!a || !b || !c) continue;
    const b1 = bearing(a.lat, a.lng, b.lat, b.lng);
    const b2 = bearing(b.lat, b.lng, c.lat, c.lng);
    if (bearingDiff(b1, b2) > 15) turns.push(pathIds[i]);
  }
  turns.push(pathIds[pathIds.length - 1]);
  return turns;
}

// ---- Render ----
function render() {
  markersLayer.clearLayers();
  edgesLayer.clearLayers();
  verifyLayer.clearLayers();
  if (!data) return;

  const showAll = selectedFloor === -1;
  const floorWps = data.pathGraph.waypoints.filter(w => showAll || w.floor === selectedFloor);
  const wpsById = {};
  data.pathGraph.waypoints.forEach(w => wpsById[w.id] = w);

  // Edges
  data.pathGraph.edges.forEach(e => {
    const a = wpsById[e.from], b = wpsById[e.to];
    if (!a || !b) return;
    const aVisible = showAll || a.floor === selectedFloor;
    const bVisible = showAll || b.floor === selectedFloor;
    if (!aVisible && !bVisible) return;
    const color = aVisible && bVisible ? '#4caf50' : '#bdbdbd';
    L.polyline([[a.lat, a.lng], [b.lat, b.lng]], {
      color, weight: 3, opacity: 0.7
    }).bindTooltip(`${e.weight}m`).addTo(edgesLayer);
  });

  // Waypoints
  floorWps.forEach(w => {
    const isPoi = data.pois.some(p => Math.abs(p.lat - w.lat) < 0.00005 && Math.abs(p.lng - w.lng) < 0.00005);
    const isQr = data.qrMarkers.some(q => Math.abs(q.lat - w.lat) < 0.00005 && Math.abs(q.lng - w.lng) < 0.00005);
    const color = isPoi ? '#e65100' : isQr ? '#7b1fa2' : '#1565C0';
    const radius = isPoi ? 7 : 6;
    const m = L.circleMarker([w.lat, w.lng], {
      radius, color: '#fff', weight: 2, fillColor: color, fillOpacity: 0.9
    }).bindTooltip(`#${w.id} (f${w.floor})`, { direction: 'top' });
    m._wpId = w.id;
    m.on('click', () => onWpClick(w.id));
    markersLayer.addLayer(m);
  });

  // POIs (extra markers for those not near waypoints)
  data.pois.forEach(p => {
    const near = data.pathGraph.waypoints.some(w =>
      Math.abs(w.lat - p.lat) < 0.00005 && Math.abs(w.lng - p.lng) < 0.00005 && w.floor === p.floor
    );
    if (near) return;
    if (!showAll && p.floor !== selectedFloor) return;
    L.circleMarker([p.lat, p.lng], {
      radius: 8, color: '#fff', weight: 2, fillColor: '#e65100', fillOpacity: 0.9
    }).bindTooltip(p.name).addTo(markersLayer);
  });

  updateWpList();
}

function updateWpList() {
  const el = document.getElementById('wpList');
  if (!data) { el.innerHTML = ''; return; }
  const showAll = selectedFloor === -1;
  const items = data.pathGraph.waypoints
    .filter(w => showAll || w.floor === selectedFloor)
    .map(w => {
      const poi = data.pois.find(p => Math.abs(p.lat - w.lat) < 0.00005 && Math.abs(p.lng - w.lng) < 0.00005);
      const edgeCount = data.pathGraph.edges.filter(e => e.from === w.id || e.to === w.id).length;
      const name = poi ? poi.name : `Waypoint #${w.id}`;
      return `<div class="waypoint-item" data-id="${w.id}">
        <span class="color-dot" style="background:${poi ? '#e65100' : '#1565C0'}"></span>
        <span class="name">${name}</span>
        <span style="color:#999;font-size:11px">${edgeCount} edges</span>
        <span class="del-btn" data-del="${w.id}">✕</span>
      </div>`;
    }).join('');
  el.innerHTML = items;
  el.querySelectorAll('.waypoint-item').forEach(el => {
    el.addEventListener('click', e => {
      if (e.target.classList.contains('del-btn')) return;
      const id = parseInt(el.dataset.id);
      onWpClick(id);
    });
  });
  el.querySelectorAll('.del-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const id = parseInt(btn.dataset.del);
      if (confirm(`Delete waypoint #${id} and its edges?`)) deleteWp(id);
    });
  });
}

function onWpClick(id) {
  if (mode === 'connect') {
    if (connectFirst === null) {
      connectFirst = id;
      document.getElementById('connStatus').textContent = `First: #${id}. Tap second waypoint.`;
      document.getElementById('connStatus').style.color = '#e65100';
    } else if (connectFirst !== id) {
      addEdge(connectFirst, id);
      connectFirst = null;
      document.getElementById('connStatus').textContent = 'Edge created! Tap first waypoint again.';
      document.getElementById('connStatus').style.color = '#2e7d32';
    }
    return;
  }

  if (mode === 'verify') {
    if (verifyFirst === null) {
      verifyFirst = id;
      document.getElementById('verifyStatus').textContent = `Start: #${id}. Tap destination.`;
    } else {
      doVerify(verifyFirst, id);
      verifyFirst = null;
    }
    return;
  }

  if (mode === 'view' || mode === 'place') {
    openEditPanel(id);
  }
}

function openEditPanel(id) {
  const w = data.pathGraph.waypoints.find(w => w.id === id);
  if (!w) return;
  const poi = data.pois.find(p => Math.abs(p.lat - w.lat) < 0.00005 && Math.abs(p.lng - w.lng) < 0.00005);
  editingWp = id;
  document.getElementById('editId').value = id;
  document.getElementById('editName').value = poi ? poi.name : '';
  document.getElementById('editType').value = poi ? poi.type : 'junction';
  document.getElementById('editLat').value = w.lat.toFixed(6);
  document.getElementById('editLng').value = w.lng.toFixed(6);
  document.querySelectorAll('#editFloor button').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.floor) === w.floor);
  });
  switchPanel('edit');
}

// ---- Delete ----
function deleteWp(id) {
  data.pathGraph.edges = data.pathGraph.edges.filter(e => e.from !== id && e.to !== id);
  data.pathGraph.waypoints = data.pathGraph.waypoints.filter(w => w.id !== id);
  showStatus(`Deleted waypoint #${id}`);
  render();
}

// ---- Add Edge ----
function addEdge(from, to) {
  const a = data.pathGraph.waypoints.find(w => w.id === from);
  const b = data.pathGraph.waypoints.find(w => w.id === to);
  if (!a || !b) return showStatus('Waypoint not found', 3000);
  const exists = data.pathGraph.edges.some(e =>
    (e.from === from && e.to === to) || (e.from === to && e.to === from)
  );
  if (exists) return showStatus('Edge already exists', 3000);
  const weight = Math.round(haversine(a.lat, a.lng, b.lat, b.lng));
  data.pathGraph.edges.push({ from, to, weight });
  showStatus(`Edge #${from} ↔ #${to} (${weight}m)`);
  render();
}

// ---- Verify ----
function doVerify(fromId, toId) {
  verifyLayer.clearLayers();
  const result = astar(fromId, toId);
  const nodes = {};
  data.pathGraph.waypoints.forEach(w => nodes[w.id] = w);

  if (!result) {
    document.getElementById('verifyResult').style.display = 'none';
    document.getElementById('verifyStatus').textContent = 'No path found between these points!';
    document.getElementById('verifyStatus').style.color = '#d32f2f';
    return;
  }

  const latlngs = result.path.map(id => [nodes[id].lat, nodes[id].lng]);
  const turnIds = findTurnIndices(result.path);

  // Path line
  L.polyline(latlngs, { color: '#d32f2f', weight: 5, opacity: 0.8 }).addTo(verifyLayer);

  // Turn markers
  turnIds.forEach(id => {
    const n = nodes[id];
    if (!n) return;
    L.circleMarker([n.lat, n.lng], {
      radius: 8, color: '#fff', weight: 2, fillColor: '#d32f2f', fillOpacity: 1
    }).addTo(verifyLayer);
  });

  // Start/end
  const s = nodes[result.path[0]], e = nodes[result.path[result.path.length - 1]];
  L.circleMarker([s.lat, s.lng], { radius: 10, color: '#fff', weight: 3, fillColor: '#2e7d32', fillOpacity: 1 })
    .bindTooltip('Start').addTo(verifyLayer);
  L.circleMarker([e.lat, e.lng], { radius: 10, color: '#fff', weight: 3, fillColor: '#d32f2f', fillOpacity: 1 })
    .bindTooltip('Destination').addTo(verifyLayer);

  map.fitBounds(latlngs, { padding: [50, 50] });

  document.getElementById('verifyDist').textContent = result.distance.toFixed(0);
  document.getElementById('verifySteps').textContent = result.path.length;
  document.getElementById('verifyResult').style.display = 'block';
  document.getElementById('verifyStatus').textContent = `Path found! (${result.distance.toFixed(0)}m)`;
  document.getElementById('verifyStatus').style.color = '#2e7d32';
}

// ---- Publish ----
async function doPublish() {
  data.version = (data.version || 0) + 1;
  data.updatedAt = new Date().toISOString();

  if (!GITHUB_TOKEN) {
    GITHUB_TOKEN = prompt('Enter GitHub personal access token:');
    if (!GITHUB_TOKEN) return showStatus('Publish cancelled', 3000);
    localStorage.setItem('github_token', GITHUB_TOKEN);
  }

  const content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
  const message = `Admin: update campus data v${data.version}`;

  let sha = '';
  try {
    const getR = await fetch(`https://api.github.com/repos/${REPO}/contents/${DATA_PATH}`, {
      headers: { Authorization: `token ${GITHUB_TOKEN}` }
    });
    if (getR.ok) sha = (await getR.json()).sha;
  } catch(e) {}

  const body = { message, content, sha: sha || undefined, branch: 'main' };

  try {
    const r = await fetch(`https://api.github.com/repos/${REPO}/contents/${DATA_PATH}`, {
      method: 'PUT',
      headers: { Authorization: `token ${GITHUB_TOKEN}`, 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (r.ok) {
      showStatus(`Published v${data.version}! App will sync within 1-2 min.`, 5000);
    } else {
      const err = await r.json();
      showStatus(`GitHub error: ${err.message}`, 5000);
      if (err.message && err.message.includes('Bad credentials')) {
        localStorage.removeItem('github_token');
        GITHUB_TOKEN = '';
      }
    }
  } catch(e) {
    showStatus(`Network error: ${e.message}`, 5000);
  }
}

// ---- Map Click (Place Mode) ----
map.on('click', e => {
  if (mode !== 'place') return;
  const { lat, lng } = e.latlng;

  // Duplicate check
  const dup = data.pathGraph.waypoints.find(w =>
    haversine(w.lat, w.lng, lat, lng) < 15 && w.floor === placeFloor
  );
  if (dup) {
    showStatus(`Duplicate! Waypoint #${dup.id} is within 15m`, 4000);
    return;
  }

  document.getElementById('wpLat').value = lat.toFixed(6);
  document.getElementById('wpLng').value = lng.toFixed(6);

  if (tempMarker) map.removeLayer(tempMarker);
  tempMarker = L.circleMarker([lat, lng], {
    radius: 8, color: '#1565C0', fillColor: '#1565C0', fillOpacity: 0.5, weight: 3
  }).addTo(map);
});

document.getElementById('btnSaveWp').addEventListener('click', () => {
  const lat = parseFloat(document.getElementById('wpLat').value);
  const lng = parseFloat(document.getElementById('wpLng').value);
  const name = document.getElementById('wpName').value.trim();
  const type = document.getElementById('wpType').value;

  if (!lat || !lng) return showStatus('Tap on the map first', 3000);

  const id = wpIdCounter++;
  data.pathGraph.waypoints.push({ id, lat, lng, floor: placeFloor });

  if (name && type !== 'junction') {
    const poiId = `wp-poi-${id}`;
    data.pois.push({
      id: poiId, name, type, buildingId: null, floor: placeFloor,
      lat, lng, altitude: 0, description: ''
    });
  }

  if (tempMarker) { map.removeLayer(tempMarker); tempMarker = null; }
  document.getElementById('wpName').value = '';
  document.getElementById('wpLat').value = '';
  document.getElementById('wpLng').value = '';
  showStatus(`Waypoint #${id} placed on floor ${placeFloor}`);
  render();
});

// ---- Mode Switching ----
document.querySelectorAll('#toolbar [data-mode]').forEach(btn => {
  btn.addEventListener('click', () => {
    const m = btn.dataset.mode;
    if (m === 'publish') {
      doPublish();
      return;
    }
    document.querySelectorAll('#toolbar [data-mode]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    setMode(m);
  });
});

function setMode(m) {
  mode = m;
  connectFirst = null;
  verifyFirst = null;
  verifyLayer.clearLayers();
  document.getElementById('verifyResult').style.display = 'none';

  document.querySelectorAll('[id^=panel]').forEach(p => p.style.display = 'none');
  if (m === 'place') document.getElementById('panelPlace').style.display = 'block';
  else if (m === 'connect') document.getElementById('panelConnect').style.display = 'block';
  else if (m === 'verify') document.getElementById('panelVerify').style.display = 'block';
  else document.getElementById('panelView').style.display = 'block';

  if (tempMarker) { map.removeLayer(tempMarker); tempMarker = null; }
  if (m === 'place') {
    map.getContainer().style.cursor = 'crosshair';
  } else {
    map.getContainer().style.cursor = '';
  }
  if (m !== 'verify') verifyLayer.clearLayers();
  isPanelCollapsed = false;
  document.getElementById('panel').classList.remove('collapsed');
}

// ---- Floor Selectors ----
document.querySelectorAll('#placeFloor button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#placeFloor button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    placeFloor = parseInt(btn.dataset.floor);
  });
});

document.querySelectorAll('#viewFloor button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#viewFloor button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedFloor = parseInt(btn.dataset.floor);
    render();
  });
});

document.querySelectorAll('#editFloor button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#editFloor button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});

// ---- Panel Handle ----
document.getElementById('panelHandle').addEventListener('click', () => {
  isPanelCollapsed = !isPanelCollapsed;
  document.getElementById('panel').classList.toggle('collapsed', isPanelCollapsed);
});

// ---- Edit Panel ----
document.getElementById('btnSaveEdit').addEventListener('click', () => {
  const w = data.pathGraph.waypoints.find(w => w.id === editingWp);
  if (!w) return;
  const lat = parseFloat(document.getElementById('editLat').value);
  const lng = parseFloat(document.getElementById('editLng').value);
  const name = document.getElementById('editName').value.trim();
  const type = document.getElementById('editType').value;
  const floor = parseInt(document.querySelector('#editFloor button.active')?.dataset.floor ?? w.floor);
  w.lat = lat; w.lng = lng; w.floor = floor;

  const poi = data.pois.find(p => Math.abs(p.lat - w.lat) < 0.00005 && Math.abs(p.lng - w.lng) < 0.00005);
  if (poi) { poi.name = name || poi.name; poi.type = type; poi.floor = floor; poi.lat = lat; poi.lng = lng; }
  else if (name && type !== 'junction') {
    data.pois.push({ id: `wp-poi-${editingWp}`, name, type, buildingId: null, floor, lat, lng, altitude: 0, description: '' });
  }
  showStatus('Saved');
  render();
  switchPanel('view');
});

document.getElementById('btnDeleteWp').addEventListener('click', () => {
  if (confirm(`Delete waypoint #${editingWp}?`)) {
    deleteWp(editingWp);
    switchPanel('view');
  }
});

document.getElementById('btnCancelEdit').addEventListener('click', () => switchPanel('view'));

// ---- Connect Panel ----
document.getElementById('btnCancelConn').addEventListener('click', () => {
  connectFirst = null;
  document.getElementById('connStatus').textContent = 'Tap the first waypoint';
  document.getElementById('connStatus').style.color = '';
  setMode('view');
});

// ---- Verify Panel ----
document.getElementById('btnCancelVerify').addEventListener('click', () => {
  verifyFirst = null;
  document.getElementById('verifyStatus').textContent = 'Tap START waypoint';
  document.getElementById('verifyStatus').style.color = '';
  document.getElementById('verifyResult').style.display = 'none';
  verifyLayer.clearLayers();
  setMode('view');
});

// ---- Locate Me ----
document.getElementById('btnLocateMe').addEventListener('click', () => {
  if (!navigator.geolocation) return showStatus('Geolocation not available', 3000);
  showStatus('Getting location...');
  navigator.geolocation.getCurrentPosition(pos => {
    const { latitude: lat, longitude: lng } = pos.coords;
    map.setView([lat, lng], 18);
    if (gpsMarker) map.removeLayer(gpsMarker);
    gpsMarker = L.circleMarker([lat, lng], {
      radius: 10, color: '#1565C0', fillColor: '#1565C0', fillOpacity: 0.3, weight: 3
    }).bindTooltip('You are here').addTo(map);
    showStatus(`📍 ${lat.toFixed(6)}, ${lng.toFixed(6)}`);
  }, () => showStatus('GPS error', 3000), { enableHighAccuracy: true });
});

// ---- Download JSON ----
document.getElementById('btnDownloadJson').addEventListener('click', () => {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'data.json';
  a.click();
  showStatus('Downloaded data.json');
});

function switchPanel(id) {
  document.querySelectorAll('[id^=panel]').forEach(p => p.style.display = 'none');
  document.getElementById(id).style.display = 'block';
}

// ---- Init ----
loadData();
</script>
